<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="flunky.bet — money ball">
  <title>flunky.bet</title>
  <defs>
    <radialGradient id="ball" cx="37%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#FFEEB0"/>
      <stop offset="40%" stop-color="#F7B500"/>
      <stop offset="100%" stop-color="#C47A00"/>
    </radialGradient>
  </defs>
  <!-- coin / ball -->
  <circle cx="16" cy="16" r="15.2" fill="url(#ball)" stroke="#875200" stroke-width="0.8"/>
  <!-- specular highlight for the ball sheen -->
  <ellipse cx="12" cy="10.5" rx="6.5" ry="4.5" fill="#FFFFFF" opacity="0.28"/>
  <!-- $ symbol, built from stroked paths so it renders without any font -->
  <g fill="none" stroke="#0c3f1f" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 4.6 V27.4" stroke-width="2.5"/>
    <path d="M21 10.7
             C21 8.1 18 7.2 16 7.2
             C12.7 7.2 10.6 8.9 10.6 11.4
             C10.6 14 13.4 15 16 16
             C18.6 17 21.4 18 21.4 20.6
             C21.4 23.1 19.3 24.8 16 24.8
             C13.8 24.8 10.8 23.9 10.8 21.3"
          stroke-width="3.1"/>
  </g>
</svg>
